triage:
  sample_pages: [1, 3, 5, 10, -1]
  classification:
    scanned_image:
      median_char_density_max: 0.0005
      median_image_ratio_min: 0.7
      min_pages_with_text: 2
    native_digital:
      median_char_density_min: 0.001
      median_image_ratio_max: 0.4

confidence_scoring:
  fast_text:
    weights:
      char_density: 0.4
      image_ratio: 0.3
      table_structure_preserved: 0.2
      font_metadata_present: 0.1
    min_confidence_to_proceed: 0.75